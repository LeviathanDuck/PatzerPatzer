<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patzer Pro - Prompt Tracking Dashboard</title>
<style>
:root {
  --bg: #1a1a1a;
  --bg-card: #222;
  --bg-header: #111;
  --text: #e8e8e8;
  --text-dim: #888;
  --border: #333;
  --accent: #4a9;
  --status-passed: #4a9;
  --status-notes: #8b8;
  --status-issues: #c46060;
  --status-rework: #e05555;
  --status-run: #6ba3d6;
  --status-started: #e8a040;
  --status-ready: #9b86d6;
  --status-pending: #666;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 52px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header__brand {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  white-space: nowrap;
}
.header__title {
  font-size: 0.85rem;
  color: var(--text-dim);
}
.header__stats {
  margin-left: auto;
  font-size: 0.8rem;
  color: var(--text-dim);
  display: flex;
  gap: 12px;
  align-items: center;
}
.header__stat { white-space: nowrap; }
.header__stat b { color: var(--text); }
.header__refresh {
  padding: 4px 10px;
  background: var(--bg-card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.header__refresh:hover { background: var(--accent); color: #111; border-color: var(--accent); }
.header__generated {
  font-size: 0.72rem;
  color: #555;
  white-space: nowrap;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px;
}
.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}
.toolbar input[type="text"] {
  flex: 1;
  min-width: 200px;
  padding: 6px 10px;
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.85rem;
}
.toolbar input[type="text"]::placeholder { color: var(--text-dim); }
.sort-select {
  padding: 4px 8px;
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.8rem;
  cursor: pointer;
  flex-shrink: 0;
}
.sort-select:focus { outline: 1px solid var(--accent); }
.filter-btn {
  padding: 4px 10px;
  background: var(--bg-card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.15s;
}
.filter-btn:hover { background: #2a2a2a; }
.filter-btn.active {
  background: var(--accent);
  color: #111;
  border-color: var(--accent);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
thead th {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th:hover { color: var(--text); }
tbody tr {
  border-bottom: 1px solid #262626;
  cursor: pointer;
  transition: background 0.1s;
}
tbody tr:hover { background: #252525; }
td { padding: 6px 10px; vertical-align: top; }
td.id { font-family: monospace; font-size: 0.82rem; white-space: nowrap; color: var(--accent); }
.id-copy {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.95rem;
  padding: 2px 6px 2px 0;
  opacity: 0.8;
  transition: opacity 0.15s, color 0.15s;
  vertical-align: middle;
  line-height: 1;
}
.id-copy:hover { opacity: 1; color: var(--accent); }
.id-copy.copied { opacity: 1; color: var(--status-passed); }
td.title { max-width: 360px; }
.row-copy {
  background: #2a2a2a;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
  white-space: nowrap;
}
.row-copy:hover { background: var(--accent); color: #111; border-color: var(--accent); }
.row-copy.copied { background: var(--status-passed); color: #111; border-color: var(--status-passed); }
td.actions { text-align: right; width: 1%; white-space: nowrap; }
tr.row--manager {
  background: #1e2228;
  border-left: 3px solid #6ba3d6;
}
tr.row--manager:hover { background: #242a32; }
tr.row--manager td.id { color: #6ba3d6; }
tr.row--manager td.title { font-weight: 600; }
.kind-badge {
  display: inline-block;
  font-size: 0.72rem;
  color: var(--text-dim);
}
.kind-badge--manager {
  background: rgba(107, 163, 214, 0.15);
  color: #6ba3d6;
  border: 1px solid rgba(107, 163, 214, 0.3);
  border-radius: 3px;
  padding: 1px 6px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.new-badge {
  display: inline-block;
  background: #e8a735;
  color: #111;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: 5px;
  vertical-align: middle;
  line-height: 1.3;
}
.batch-hint {
  display: inline-block;
  font-size: 0.72rem;
  color: #6ba3d6;
  margin-left: 8px;
  opacity: 0.7;
}
td.date { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }
td.source { font-size: 0.78rem; color: var(--text-dim); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.kind { font-size: 0.78rem; color: var(--text-dim); }
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.status--passed  { background: var(--status-passed); color: #111; }
.status--notes   { background: var(--status-notes); color: #111; }
.status--issues  { background: var(--status-issues); color: #111; }
.status--rework  { background: var(--status-rework); color: #fff; }
.status--run     { background: var(--status-run); color: #111; }
.status--started { background: var(--status-started); color: #111; }
.status--ready   { background: var(--status-ready); color: #111; }
.status--pending { background: var(--status-pending); color: #ddd; }
.status--reviewed { background: #555; color: #ddd; }
.count-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 8px; }

/* Detail overlay */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  display: flex;
  justify-content: center;
  overflow-y: auto;
  padding: 24px 16px;
}
.detail-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 800px;
  width: 100%;
  margin: auto;
  padding: 0;
}
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.detail-header h2 {
  margin: 0;
  font-size: 1.1rem;
  flex: 1;
}
.detail-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.detail-close:hover { color: var(--text); }
.detail-id-copy {
  background: var(--bg-card);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  vertical-align: middle;
  margin-left: 8px;
}
.detail-id-copy:hover { background: var(--accent); color: #111; border-color: var(--accent); }
.detail-id-copy.copied { background: var(--status-passed); color: #111; border-color: var(--status-passed); }
.detail-body { padding: 16px 20px; }
.detail-meta {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 4px 12px;
  font-size: 0.85rem;
  margin-bottom: 16px;
}
.detail-meta dt { color: var(--text-dim); font-weight: 600; }
.detail-meta dd { margin: 0; word-break: break-word; }
.detail-section {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.detail-section h3 {
  margin: 0 0 8px;
  font-size: 0.9rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.detail-body .pre-wrap {
  position: relative;
}
.detail-body pre {
  background: #181818;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  overflow-x: auto;
  font-size: 0.82rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  color: #ccc;
  max-height: 400px;
  overflow-y: auto;
}
.copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #2a2a2a;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  z-index: 1;
}
.copy-btn:hover { background: var(--accent); color: #111; border-color: var(--accent); }
.copy-btn.copied { background: var(--status-passed); color: #111; border-color: var(--status-passed); }

@media (max-width: 700px) {
  .header { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 6px; }
  .header__stats { margin-left: 0; flex-wrap: wrap; }
  .container { padding: 10px; }
  .detail-meta { grid-template-columns: 1fr; }
  .detail-meta dt { margin-top: 6px; }
  td.title { max-width: none; }
}
</style>
</head>
<body>

<div class="header">
  <a class="header__brand" href="#">Patzer Pro</a>
  <span class="header__title">Prompt Tracking Dashboard</span>
  <div class="header__stats" id="stats"></div>
  <span class="header__generated">Updated Mar 27, 5:29 PM</span>
  <button class="header__refresh" id="refresh-btn" title="Regenerate dashboard from latest registry data">Refresh Data</button>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="search" placeholder="Filter by ID, title, or task...">
    <div id="filter-buttons"></div>
    <select id="sort-select" class="sort-select"></select>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Date</th>
        <th>Source</th>
        <th>Kind</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="prompt-list"></tbody>
  </table>
  <div class="count-label" id="count-label"></div>
</div>

<div class="detail-overlay" id="detail" style="display:none">
  <div class="detail-card">
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

sible\n- make sure entering/exiting retrospection redraws cleanly\n- do not bundle solve-loop changes\n- do not bundle new retrospection features\n- do not redesign the tools column beyond what is required to stop the render corruption\n\nA likely safe direction is:\n- replace boolean-producing conditional child expressions with explicit `null`/array-safe vnode handling\n- keep the ownership where it already lives unless inspection proves a tiny extraction is safer\n- validate the exact redraw paths that previously triggered the crash\n\nBefore coding, provide:\n- prompt id\n- task id\n- parent prompt id\n- source document\n- source step\n- task title\n- relevant Patzer Pro files\n- relevant Lichess files\n- diagnosis\n- exact small step to implement\n- why that step is safely scoped\n\nThen implement the change directly.\n\nValidation is required after coding:\n- run `npm run build`\n- run the most relevant task-specific check you can for this render bug\n- explicitly verify:\n  - entering retrospection no longer throws the Snabbdom boolean-child error\n  - retrospection panels do not duplicate during navigation / solve actions\n  - the move list / tools column stay stable during redraws\n  - the player-strip/material display is no longer corrupted by this render failure\n  - switching to another game no longer carries the poisoned UI state forward\n- report whether behavior changed intentionally\n- report whether there are console/runtime errors\n- report remaining risks and limitations\n\nAlso include a short manual test checklist with concrete user actions and expected results. Keep it tightly scoped to this fix.\n\nOutput shape:\n- prompt id\n- task id\n- parent prompt id\n- source document\n- source step\n- task title\n- relevant Patzer Pro files\n- relevant Lichess files\n- diagnosis\n- exact small step to implement\n- why that step is safely scoped\n- implementation\n- validation\n- manual test checklist\n- remaining risks\n\nIn your final report, repeat:\n- `Prompt ID: CCP-021-F1`\n- `Task ID: CCP-021`"},{"id":"CCP-015-F2","title":"Per-Candidate Engine Guidance Toggle In Retrospection","taskId":"CCP-015","parentPromptId":"CCP-015-F1","batchPromptIds":[],"sourceDocument":"docs/NEXT_STEPS.md","sourceStep":"Priority 3, Item 10","task":"keep engine guidance off by default in retrospection, allow per-candidate reveal, and reset to hidden on the next mistake","executionTarget":"Claude Code","createdBy":"unknown","createdAt":"","startedAt":"","status":"reviewed","reviewOutcome":"passed","reviewIssues":"none","queueState":"not-queued","claudeUsed":true,"kind":"follow-up","notes":"adds a retro-owned per-candidate guidance reveal flag and resets it on candidate advance, matching the requested default-hidden behavior","statusLabel":"REVIEWED: PASSED","statusClass":"status--passed","body":"Prompt ID: CCP-015-F2\nTask ID: CCP-015\nParent Prompt ID: CCP-015-F1\nSource Document: docs/NEXT_STEPS.md\nSource Step: Priority 3, Item 10\n\nTask: Take the next smallest safe follow-up step on retrospection guidance concealment by making engine guidance hidden by default whenever Learn From Mistakes mode is entered, while allowing the user to reveal it manually for the current mistake only, and automatically resetting back to hidden when advancing to the next mistake.\n\nTreat this as a focused follow-up to the retrospection guidance work, not as permission to redesign the engine settings model or broaden the retrospection solve loop.\n\nBefore editing, inspect the current codebase first and confirm the real implementation points instead of guessing. Start with:\n- `src/main.ts`\n- `src/analyse/retroCtrl.ts`\n- `src/analyse/ctrl.ts`\n- `src/ceval/view.ts`\n- `src/engine/ctrl.ts`\n- `AGENTS.md`\n- `CLAUDE.md`\n- `docs/ARCHITECTURE.md`\n- `docs/NEXT_STEPS.md`\n- `docs/KNOWN_ISSUES.md`\n- `docs/reference/lichess-retrospection/README.md`\n- `docs/reference/lichess-retrospection-ux/README.md`\n\nRelevant Patzer Pro files already identified from c ny closely related Lichess analyse/retrospect files you find necessary for first-pass acceptance and answer reveal flow\n\nCurrent repo-grounded diagnosis:\n- the roadmap explicitly says the first-pass acceptance rule should be exact engine best move only\n- it also says success should reveal the stored best line and advance, while failure should show the expected move and line and allow continue / retry\n- current Patzer repo does not yet have a dedicated retrospection session loop; board input still flows through the normal analysis board wiring\n- `CCP-013` review found unresolved lifecycle problems, so this task must verify those seams are actually usable before building solve behavior on top\n- the smallest safe step is not full Lichess-style practice parity\n- the smallest safe step is a minimal current-game loop with exact-best-move acceptance only\n\nLichess parity requirement:\n- use Lichess retrospect solve/reveal flow as the baseline before any Patzer-specific tuning\n- specifically compare against:\n  - `retroCtrl.ts` feedback states: `find`, `eval`, `win`, `fail`, `view`, `offTrack`\n  - `retroCtrl.ts` `jumpToNext()`, `onJump()`, `onWin()`, `onFail()`, `viewSolution()`, and `skip()`\n  - `retroView.ts` messaging and next/solution transitions\n- do not tune thresholds, acceptance rules, or reveal sequencing away from Lichess in this task unless Patzer’s current data limitations force a temporary simplification\n- if a temporary deviation is necessary, keep it minimal and call it out explicitly in remaining risks\n- even though this first pass stays exact-best-only, preserve a controller/state shape that can later grow into Lichess-style `eval` / near-best acceptance instead of hard-coding one-off board checks\n\nImplement only the smallest safe step:\n- add a minimal retrospection session state for the current game only\n- at a candidate position, accept only the exact stored best move\n- on success, show the expected/best line and allow advancing to the next candidate\n- on failure, show the expected move and line, then allow retry or continue\n- keep the loop sequential through current-game candidates only\n- do not add near-best acceptance by eval margin\n- do not add opening/book cancellation\n- do not add cross-game queueing or saved-puzzles coupling\n- do not redesign board move handling broadly\n- if inspection shows the unresolved `CCP-013` lifecycle seam still blocks this task, stop and report that rather than building a fake parallel flow\n\nA likely safe direction is:\n- intercept board move handling only when a retrospection session is active\n- compare the attempted move against the stored candidate best move\n- keep the session state in a dedicated small module rather than spreading conditionals across unrelated analysis code\n- mirror the Lichess feedback-state progression as closely as current Patzer data allows, even if the first pass omits near-best acceptance\n- keep explicit room in the state machine for later `eval` / `offTrack` / `view` parity instead of collapsing everything into a binary pass/fail toggle\n- reveal stored answer data only after the user attempt result is known\n\nBefore coding, provide:\n- prompt id\n- task id\n- source document\n- source step\n- task title\n- relevant Patzer Pro files\n- relevant Lichess files\n- diagnosis\n- exact small step to implement\n- why that step is safely scoped\n\nThen implement the change directly.\n\nValidation is required after coding:\n- run `npm run build`\n- run the most relevant task-specific check you can for this behavior\n- explicitly verify:\n  - in retrospection mode, playing the exact stored best move counts as success\n  - a non-best move triggers the failure/reveal path instead of silently proceeding\n  - after success, the UI can advance to the next candidate\n  - after failure, the user can retry or continue\n  - normal analysis-board move handling is unchanged when retrospection is not active\n  - the implementation does not foreclose later Lichess-style `eval` fallback and off-track handling\n- report whether behavior changed intentionally\n- report whether there are console/runtime errors\n- report remaining risks and limitations, especially:\n  - that near-best acceptance and broader practice-state parity are intentionally deferred\n  - and whether unresolved `CCP-013` lifecycle gaps still limit true Lichess-style behavior\n\nAlso include a short manual test checklist with concrete user actions and expected results. Keep it tightly scoped to this change.\n\nOutput shape:\n- prompt id\n- task id\n- source document\n- source step\n- task title\n- relevant Patzer Pro files\n- relevant Lichess files\n- diagnosis\n- exact small step to implement\n- why that step is safely scoped\n- implementation\n- validation\n- manual test checklist\n- remaining risks\n\nIn your final report, repeat the same `Task ID: CCP-015`."},{"id":"CCP-014","title":"Enter Retrospection For Current Game","taskId":"CCP-014","parentPromptId":null,"batchPromptIds":[],"sourceDocument":"docs/NEXT_STEPS.md","sourceStep":"Priority 3, Item 10","task":"add a minimal current-game retrospection entry affordance","executionTarget":"Claude Code","createdBy":"unknown","createdAt":"","startedAt":"","status":"reviewed","reviewOutcome":"issues found","reviewIssues":"the `Mistakes` button still enables and opens an empty retro session when there are zero eligible candidates, instead of failing honestly with a disabled/empty state","queueState":"not-queued","claudeUsed":true,"kind":"normal","notes":"enters retrospection and jumps to the first candidate when one exists, but still presents a misleading active `Mistakes` state when there are zero eligible candidates","statusLabel":"REVIEWED: ISSUES FOUND","statusClass":"status--issues","body":"Prompt ID: CCP-014\nTask ID: CCP-014\nSource Document: docs/NEXT_STEPS.md\nSource Step: Priority 3, Item 10\n\nTask: Take the next smallest safe step on the local per-game “Learn From Mistakes” flow by // --- Live data fetch (dev server only) ---
// When served via the dev server, fetch the registry live so the dashboard
// always shows current data without needing regeneration.
async function fetchLiveData() {
  if (location.protocol === 'file:') return; // static file — use baked data
  try {
    const res = await fetch('/api/prompt-registry');
    if (!res.ok) return;
    const registry = await res.json();
    if (!Array.isArray(registry.prompts)) return;

    // Rebuild PROMPTS from live registry
    const livePrompts = [];
    for (const p of registry.prompts) {
      // Fetch prompt body
      let body = '';
      try {
        const itemRes = await fetch('/api/prompt-item/' + p.id);
        if (itemRes.ok) body = await itemRes.text();
      } catch {}

      livePrompts.push({
        id: p.id,
        title: p.title || '',
        taskId: p.taskId || '',
        parentPromptId: p.parentPromptId,
        batchPromptIds: p.batchPromptIds || [],
        sourceDocument: p.sourceDocument || '',
        sourceStep: p.sourceStep || '',
        task: p.task || '',
        executionTarget: p.executionTarget || '',
        createdBy: p.createdBy || 'unknown',
        createdAt: p.createdAt || '',
        startedAt: p.startedAt || '',
        status: p.status || 'created',
        reviewOutcome: p.reviewOutcome || 'pending',
        reviewIssues: p.reviewIssues || 'none',
        queueState: p.queueState || 'not-queued',
        claudeUsed: p.claudeUsed || false,
        kind: p.kind || 'normal',
        notes: p.notes || 'none',
        statusLabel: computeStatusLabel(p),
        statusClass: computeStatusClass(p),
        body: body,
        isNew: false, // live mode doesn't track new-since-last-refresh
      });
    }
    PROMPTS = livePrompts;
    renderStats();
    renderFilterButtons();
    renderList();
    // Update the timestamp display
    const genEl = document.querySelector('.header__generated');
    if (genEl) genEl.textContent = 'Live data';
  } catch (e) {
    console.warn('[dashboard] live fetch failed, using baked data', e);
  }
}

function computeStatusLabel(p) {
  if (p.status === 'reviewed') {
    switch (p.reviewOutcome) {
      case 'passed': return 'REVIEWED: PASSED';
      case 'passed with notes': return 'REVIEWED: PASSED WITH NOTES';
      case 'issues found': return 'REVIEWED: ISSUES FOUND';
      case 'needs rework': return 'REVIEWED: NEEDS REWORK';
      default: return 'REVIEWED';
    }
  }
  if (p.queueState === 'queued-started') return 'RAN: NEEDS REVIEW';
  if (p.queueState === 'queued-run') return 'RAN: READY FOR REVIEW';
  if (p.queueState === 'queued-pending') return 'READY TO RUN';
  if (p.status === 'created') return 'NOT REVIEWED';
  return (p.status || '').toUpperCase() || 'UNKNOWN';
}

function computeStatusClass(p) {
  if (p.status === 'reviewed') {
    if (p.reviewOutcome === 'passed') return 'status--passed';
    if (p.reviewOutcome === 'passed with notes') return 'status--notes';
    if (p.reviewOutcome === 'issues found') return 'status--issues';
    if (p.reviewOutcome === 'needs rework') return 'status--rework';
    return 'status--reviewed';
  }
  if (p.queueState === 'queued-started') return 'status--started';
  if (p.queueState === 'queued-run') return 'status--run';
  if (p.queueState === 'queued-pending') return 'status--ready';
  return 'status--pending';
}

// --- Date formatting (Pacific time, human-readable) ---
function fmtDate(iso) {
  if (!iso || iso === 'unknown' || iso === 'not started') return iso || '';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString('en-US', {
      timeZone: 'America/Los_Angeles',
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true,
    });
  } catch { return iso; }
}
function fmtDateShort(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso.slice(0, 10);
    const now = Date.now();
    const ago = now - d.getTime();
    if (ago >= 0 && ago < 86400000) {
      const mins = Math.floor(ago / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      return hrs + 'h ago';
    }
    return d.toLocaleDateString('en-US', {
      timeZone: 'America/Los_Angeles',
      month: 'short', day: 'numeric',
    });
  } catch { return iso.slice(0, 10); }
}

// --- Sort presets ---
function idNum(p) { return parseInt(p.id.replace(/\D/g, '')) || 0; }

// Priority rank for "next up" sort: lower = higher priority.
// Ranks 0-2 are queue items that always float to the top.
// Everything else collapses to rank 3 and sorts by recency.
function nextUpRank(p) {
  if (p.queueState === 'queued-pending') return 0; // ready to run — top
  if (p.queueState === 'queued-started') return 1; // in progress
  if (p.queueState === 'queued-run')     return 2; // run, awaiting review
  return 3; // all non-queue items: sort by recency within this rank
}

// Best available date for recency sorting (prefer startedAt, fall back to createdAt)
function bestDate(p) {
  return p.startedAt || p.createdAt || '';
}

const SORT_PRESETS = [
  { value: 'next-up',     label: 'Next Up' },
  { value: 'id-newest',   label: 'ID (newest first)' },
  { value: 'id-oldest',   label: 'ID (oldest first)' },
  { value: 'date-newest',  label: 'Date (newest first)' },
  { value: 'date-oldest',  label: 'Date (oldest first)' },
  { value: 'title-az',    label: 'Title (A-Z)' },
  { value: 'title-za',    label: 'Title (Z-A)' },
  { value: 'status',      label: 'Status' },
  { value: 'kind',        label: 'Kind' },
  { value: 'source',      label: 'Source Document' },
];

function sortPrompts(list) {
  return [...list].sort((a, b) => {
    switch (sortPreset) {
      case 'next-up': {
        const ra = nextUpRank(a), rb = nextUpRank(b);
        if (ra !== rb) return ra - rb;
        // Queue items (ranks 0-2): earliest ID first
        if (ra < 3) return idNum(a) - idNum(b);
        // Non-queue items (rank 3): most recent first by date, then highest ID
        const da = bestDate(a), db = bestDate(b);
        if (da || db) {
          const cmp = (db || '').localeCompare(da || '');
          if (cmp !== 0) return cmp;
        }
        return idNum(b) - idNum(a);
      }
      case 'id-newest':  return idNum(b) - idNum(a);
      case 'id-oldest':  return idNum(a) - idNum(b);
      case 'date-newest': return (b.startedAt || b.createdAt || '').localeCompare(a.startedAt || a.createdAt || '') || idNum(b) - idNum(a);
      case 'date-oldest': return (a.startedAt || a.createdAt || '').localeCompare(b.startedAt || b.createdAt || '') || idNum(a) - idNum(b);
      case 'title-az':   return a.title.localeCompare(b.title);
      case 'title-za':   return b.title.localeCompare(a.title);
      case 'status':     return a.statusLabel.localeCompare(b.statusLabel) || idNum(a) - idNum(b);
      case 'kind':       return (a.kind || '').localeCompare(b.kind || '') || idNum(a) - idNum(b);
      case 'source':     return (a.sourceDocument || '').localeCompare(b.sourceDocument || '') || idNum(a) - idNum(b);
      default:           return 0;
    }
  });
}

// --- Render list ---
function filterPrompts() {
  let list = PROMPTS;
  if (filterStatus) list = list.filter(p => p.statusClass === filterStatus);
  if (searchText) {
    const q = searchText.toLowerCase();
    list = list.filter(p =>
      p.id.toLowerCase().includes(q) ||
      p.title.toLowerCase().includes(q) ||
      (p.task || '').toLowerCase().includes(q)
    );
  }
  return sortPrompts(list);
}

function renderList() {
  const list = filterPrompts();
  const tbody = document.getElementById('prompt-list');
  tbody.innerHTML = list.map(p => {
    // Show a short source label: just the filename without path
    const srcShort = (p.sourceDocument || '').split('/').pop() || '';
    // Show copy button only for prompts not yet run or reviewed
    const showCopy = p.status !== 'reviewed' && p.queueState !== 'queued-run';
    const copyCell = showCopy
      ? '<button class="row-copy" data-copy-id="' + esc(p.id) + '" title="Copy full prompt">Copy</button>'
      : '';
    const isManager = p.kind === 'manager';
    const rowClass = isManager ? ' class="row--manager"' : '';
    const kindLabel = isManager
      ? '<span class="kind-badge kind-badge--manager">manager</span>'
      : '<span class="kind-badge">' + esc(p.kind || 'normal') + '</span>';
    const batchHint = isManager && p.batchPromptIds && p.batchPromptIds.length
      ? '<span class="batch-hint">' + p.batchPromptIds.length + ' prompts</span>'
      : '';
    const newBadge = p.isNew ? '<span class="new-badge">new</span>' : '';
    // Show startedAt if ran, otherwise createdAt
    const dateRaw = p.startedAt || p.createdAt || '';
    const dateLabel = fmtDateShort(dateRaw);
    const dateTitle = p.startedAt ? 'Ran: ' + fmtDate(p.startedAt) : (p.createdAt ? 'Created: ' + fmtDate(p.createdAt) : '');
    return '<tr data-id="' + p.id + '"' + rowClass + '>' +
      '<td class="id"><button class="id-copy" data-id="' + esc(p.id) + '" title="Copy prompt ID">&#x2398;</button>' + p.id + newBadge + '</td>' +
      '<td class="title">' + esc(p.title) + batchHint + '</td>' +
      '<td class="date" title="' + esc(dateTitle) + '">' + esc(dateLabel) + '</td>' +
      '<td class="source">' + esc(srcShort) + '</td>' +
      '<td class="kind">' + kindLabel + '</td>' +
      '<td><span class="status-badge ' + p.statusClass + '">' + p.statusLabel + '</span></td>' +
      '<td class="actions">' + copyCell + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('count-label').textContent = list.length + ' of ' + PROMPTS.length + ' prompts';
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', (e) => {
      if (e.target.closest('.row-copy') || e.target.closest('.id-copy')) return; // handled separately
      openDetail(tr.dataset.id);
    });
  });
  tbody.querySelectorAll('.row-copy').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const p = PROMPTS.find(x => x.id === btn.dataset.copyId);
      if (!p) return;
      navigator.clipboard.writeText(p.body).then(() => {
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '⎘'; }, 1200);
      });
    });
  });
  tbody.querySelectorAll('.id-copy').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(btn.dataset.id).then(() => {
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '⎘'; }, 1200);
      });
    });
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Detail ---
function openDetail(id) {
  const p = PROMPTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('detail-title').innerHTML = esc(p.id) + ' <button class="detail-id-copy" data-id="' + esc(p.id) + '" title="Copy prompt ID">Copy ID</button> <span style="color:var(--text-dim);font-weight:400">— ' + esc(p.title) + '</span>';
  const meta = [
    ['Prompt ID', p.id],
    ['Task ID', p.taskId],
    ['Status', '<span class="status-badge ' + p.statusClass + '">' + p.statusLabel + '</span>'],
    ['Kind', p.kind || 'normal'],
    ['Source', esc(p.sourceDocument || '')],
    ['Source Step', esc(p.sourceStep || '')],
    ['Created By', esc(p.createdBy || 'unknown')],
    ['Created At', esc(fmtDate(p.createdAt) || 'unknown')],
    ['Started At', esc(fmtDate(p.startedAt) || 'not started')],
    ['Execution Target', esc(p.executionTarget || '')],
    ['Claude Used', p.claudeUsed ? 'Yes' : 'No'],
    ['Review Outcome', esc(p.reviewOutcome || 'pending')],
    ['Review Issues', esc(p.reviewIssues || 'none')],
  ];
  if (p.parentPromptId) meta.push(['Parent Prompt', esc(p.parentPromptId)]);
  if (p.batchPromptIds && p.batchPromptIds.length) meta.push(['Batch Prompts', esc(p.batchPromptIds.join(', '))]);
  if (p.notes && p.notes !== 'none') meta.push(['Notes', esc(p.notes)]);

  let html = '<dl class="detail-meta">';
  meta.forEach(([k, v]) => { html += '<dt>' + k + '</dt><dd>' + v + '</dd>'; });
  html += '</dl>';

  html += '<div class="detail-section"><h3>Task</h3><p>' + esc(p.task || '') + '</p></div>';
  html += '<div class="detail-section"><h3>Full Prompt</h3><div class="pre-wrap"><button class="copy-btn" data-copy-id="' + p.id + '">Copy</button><pre id="prompt-body-' + p.id + '">' + esc(p.body) + '</pre></div></div>';

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail').style.display = 'flex';
}

// Copy prompt body to clipboard
document.getElementById('detail-body').addEventListener('click', (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const id = btn.dataset.copyId;
  const pre = document.getElementById('prompt-body-' + id);
  if (!pre) return;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
});

document.getElementById('detail').addEventListener('click', (e) => {
  const btn = e.target.closest('.detail-id-copy');
  if (!btn) return;
  navigator.clipboard.writeText(btn.dataset.id).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy ID'; }, 1200);
  });
});

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail').style.display = 'none';
});
document.getElementById('detail').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detail')) {
    document.getElementById('detail').style.display = 'none';
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('detail').style.display = 'none';
});

// --- Search ---
document.getElementById('search').addEventListener('input', (e) => {
  searchText = e.target.value;
  renderList();
});

// --- Sort select ---
const sortSelect = document.getElementById('sort-select');
SORT_PRESETS.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p.value;
  opt.textContent = p.label;
  if (p.value === sortPreset) opt.selected = true;
  sortSelect.appendChild(opt);
});
sortSelect.addEventListener('change', () => {
  sortPreset = sortSelect.value;
  renderList();
});

// --- Refresh button ---
document.getElementById('refresh-btn').addEventListener('click', () => {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Refreshing...';
  btn.disabled = true;
  if (location.protocol === 'file:') {
    alert('To refresh, run in your terminal:\n\nnpm run prompts:dashboard\n\nThen reload this page.');
    btn.textContent = 'Refresh Data';
    btn.disabled = false;
  } else {
    // Live mode: re-fetch registry data directly
    fetchLiveData().then(() => {
      btn.textContent = 'Refresh Data';
      btn.disabled = false;
    });
  }
});

// --- Init ---
renderStats();
renderFilterButtons();
renderList();
// Fetch live data from dev server (replaces baked data if available)
fetchLiveData();
</script>

</body>
</html>
