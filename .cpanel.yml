deployment:
  tasks:
    - >-
      /bin/bash -c 'set -e;
      DEPLOYPATH="/home1/leftcoc0/public_html/patzerpro";
      SOURCEPATH="$PWD/public";
      [ "$DEPLOYPATH" = "/home1/leftcoc0/public_html/patzerpro" ] || { echo "ABORT: deploy path mismatch"; exit 1; };
      command -v git >/dev/null 2>&1 || { echo "ABORT: git not available"; exit 1; };
      cd "$PWD";
      echo "Deploy working directory: $PWD";
      echo "Deploy commit: $(git rev-parse HEAD)";
      echo "Deploy path: $DEPLOYPATH";
      echo "Source path: $SOURCEPATH";
      [ -z "$(git status --porcelain)" ] || { echo "ABORT: repository is not clean before deployment"; git status --short; exit 1; };
      [ -d "$SOURCEPATH" ] || { echo "ABORT: build output public/ not found"; exit 1; };
      echo "Deploying prebuilt public/ contents:";
      /bin/ls -la "$SOURCEPATH";
      /bin/mkdir -p "$DEPLOYPATH";
      /usr/bin/rsync -a --delete --exclude=".git" --exclude="generated/lichess-puzzles" "$SOURCEPATH/" "$DEPLOYPATH/";'
