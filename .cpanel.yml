deployment:
  tasks:
    - >-
      /bin/bash -c 'set -e;
      APPROOT="/home1/leftcoc0/public_html/patzerpro";
      echo "Deploy commit: $(git rev-parse HEAD)";

      echo "--- Deploying server files ---";
      /bin/cp "$PWD/server.mjs" "$APPROOT/server.mjs";
      /bin/cp "$PWD/package.json" "$APPROOT/package.json";
      /usr/bin/rsync -a --delete "$PWD/server/" "$APPROOT/server/";

      echo "--- Deploying static files to public/ ---";
      /bin/mkdir -p "$APPROOT/public";
      /usr/bin/rsync -a --delete
        --exclude=".git"
        --exclude="generated/lichess-puzzles"
        "$PWD/public/" "$APPROOT/public/";

      echo "--- Signalling app restart ---";
      /bin/mkdir -p "$APPROOT/tmp";
      /bin/touch "$APPROOT/tmp/restart.txt";

      echo "--- Deployment complete ---";'
